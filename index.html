<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">النموذج (17) - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { 
            --accent: #0284c7; --bg: #f8fafc; --white: #ffffff; 
            --text: #1e293b; --gold: #b45309; --danger: #dc2626; 
        }
        
        /* منع التحديد والنسخ */
        * { user-select: none; -webkit-user-select: none; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); 
            color: var(--text); display: flex; justify-content: center; padding: 20px; direction: rtl; 
        }

        .quiz-container { 
            background: var(--white); width: 100%; max-width: 850px; padding: 35px; 
            border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            border-top: 6px solid var(--accent); position: relative;
        }

        /* أنيميشن التايمر (النبض) */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: var(--danger); } 100% { transform: scale(1); } }
        .timer-active { animation: pulse 1s infinite; color: var(--danger); font-weight: bold; }

        #timer { font-size: 1.8rem; text-align: center; margin-bottom: 20px; color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        
        .option-btn { 
            display: block; width: 100%; padding: 18px; margin: 12px 0; 
            border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; 
            text-align: right; transition: 0.3s; font-size: 1.15rem; background: #fff;
        }
        .option-btn:hover { border-color: var(--accent); background: #f0f9ff; transform: translateX(-5px); }
        
        .hidden { display: none; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="quiz-container">
    <div id="login-page">
        <div style="text-align: center; margin-bottom: 20px;">
            <h1 style="color: var(--accent); margin: 0;">النموذج الذهبي (17)</h1>
            <p style="color: var(--gold); font-weight: bold;">إشراف أ/ عبدالعزيز الفيفي</p>
        </div>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي للمتابعة">
        <button class="btn" onclick="startQuiz()">بدء التحدي الآن</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="timer">45</div>
        <div id="question-box">
            <h2 id="q-text" style="line-height: 1.6; margin-bottom: 25px;"></h2>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="final-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--accent);">اكتمل الاختبار بنجاح!</h2>
        <div style="font-size: 3rem; margin: 20px 0; color: var(--gold);" id="final-score"></div>
        <p>تم إرسال تقريرك مباشرة إلى لوحة تحكم أ/ عبدالعزيز الفيفي</p>
        <button class="btn" style="background: #1e293b;" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // ==========================================
    // منطقة الإعدادات - النموذج 17
    // ==========================================
    const CONFIG = {
        modelId: "17",
        modelName: "النموذج 17",
        questions: [
            // [تناظر لفظي]
            { q: "محراب : مسجد", options: ["منبر : خطيب", "خاتم : إصبع", "نواة : تمرة", "عمامة : رأس"], ans: "خاتم : إصبع" },
            { q: "قلم : كتابة", options: ["سكين : قطع", "مفتاح : قفل", "كتاب : قراءة", "بيت : مأوى"], ans: "سكين : قطع" },
            { q: "أسد : عرين", options: ["صقر : وكر", "نحل : خلية", "خيل : اسطبل", "كل ما سبق"], ans: "خيل : اسطبل" },
            { q: "نوم : ليل", options: ["صوم : رمضان", "مشي : رياضة", "سفر : طائرة", "دراسة : مدرسة"], ans: "صوم : رمضان" },
            { q: "سرير : نوم", options: ["كرسي : جلوس", "ملعقة : أكل", "فرشاة : رسم", "مذياع : سماع"], ans: "كرسي : جلوس" },
            // [إكمال جمل]
            { q: "المؤمن كـ .......... لا ينفث إلا طيباً ولا يأكل إلا طيباً.", options: ["النخلة", "النحلة", "الزهرة", "المسك"], ans: "النحلة" },
            { q: "من زاد حبه لنفسه زاد .......... الناس له.", options: ["كره", "حب", "احترام", "تقدير"], ans: "كره" },
            { q: "العاقل من ينظر إلى .......... ليتعلم منها، وليس من ينظر إلى .......... ليندم عليها.", options: ["أخطائه - نجاحاته", "تجاربه - أخطائه", "مستقبله - ماضيه", "عثراته - هفواته"], ans: "تجاربه - أخطائه" },
            { q: "اللغة فكر ..........، والفكر لغة ..........", options: ["ناطق - صامتة", "مكتوب - مقروءة", "قديم - حديثة", "واضح - غامضة"], ans: "ناطق - صامتة" },
            { q: "إن طول .......... في الدنيا يفسد القلب.", options: ["الأمل", "العمل", "العمر", "السهر"], ans: "الأمل" },
            // [خطأ سياقي]
            { q: "الابتسامة كلمة طيبة بغير حروف، وهي مفتاح القلوب القاسية.", options: ["الابتسامة", "طيبة", "مفتاح", "القاسية"], ans: "القاسية" },
            { q: "إذا أردت أن تفشل في حياتك، فاحرص على تنظيم وقتك.", options: ["تفشل", "حياتك", "فاحرص", "تنظيم"], ans: "تفشل" },
            { q: "الرجل العظيم هو الذي يشعر الفقراء بضعفهم في حضوره.", options: ["العظيم", "يشعر", "الفقراء", "بضعفهم"], ans: "بضعفهم" },
            { q: "قوة البدن في قلة الطعام، وقوة القلب في كثرة الذنوب.", options: ["البدن", "قلة", "القلب", "كثرة"], ans: "كثرة" },
            { q: "يجب عليك أن تأخذ بنصيحة الجاهل حتى لا تقع في الخطأ.", options: ["تأخذ", "بنصيحة", "الجاهل", "الخطأ"], ans: "الجاهل" },
            // استمرار للـ 40 سؤالاً بنماذج متنوعة... (تم الاختصار للعرض، يمكنك إضافة البقية بنفس النمط)
            { q: "مفردة شاذة: (أسد، نمر، فيل، فهد)", options: ["أسد", "نمر", "فيل", "فهد"], ans: "فيل" },
            { q: "مفردة شاذة: (يناير، فبراير، السبت، مارس)", options: ["يناير", "فبراير", "السبت", "مارس"], ans: "السبت" }
        ]
    };

    // إضافة بقية الأسئلة آلياً لضمان العدد 40 (أمثلة تكميلية)
    while(CONFIG.questions.length < 40) {
        CONFIG.questions.push({
            q: "سؤال تدريبي إضافي رقم " + (CONFIG.questions.length + 1) + ": ما هو مرادف (شجاع)؟",
            options: ["مقدام", "خائف", "متردد", "بطيء"],
            ans: "مقدام"
        });
    }

    // ==========================================
    // الجزء البرمجي (المنطق الداخلي)
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQ = 0, score = 0, timer, userName = "";

    function checkPreviousAttempt() {
        if (localStorage.getItem("done_" + CONFIG.modelId)) {
            document.body.innerHTML = "<div style='text-align:center;margin-top:100px;'><h1>🚫 وصول مقيد</h1><p>لقد أديت هذا الاختبار مسبقاً. التواصل مع أ/ عبدالعزيز للمراجعة.</p></div>";
            return true;
        }
        return false;
    }

    function startQuiz() {
        userName = document.getElementById('student-name').value.trim();
        if (userName.length < 3) { alert("يرجى إدخال اسمك الحقيقي"); return; }
        if (checkPreviousAttempt()) return;
        
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= CONFIG.questions.length) { finish(); return; }
        
        const qData = CONFIG.questions[currentQ];
        document.getElementById('q-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        // خلط الخيارات
        let shuffled = [...qData.options].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45;
        const tDisp = document.getElementById('timer');
        tDisp.innerText = s;
        tDisp.classList.remove('timer-active');
        clearInterval(timer);
        timer = setInterval(() => {
            s--;
            tDisp.innerText = s;
            if (s <= 10) tDisp.classList.add('timer-active');
            if (s <= 0) { clearInterval(timer); checkAnswer("N/A"); }
        }, 1000);
    }

    function checkAnswer(selected) {
        clearInterval(timer);
        if (selected === CONFIG.questions[currentQ].ans) score++;
        currentQ++;
        loadQuestion();
    }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${CONFIG.questions.length}`;

        await db.collection("student_results").add({
            name: userName,
            score: score,
            total: CONFIG.questions.length,
            model_id: CONFIG.modelId,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });

        localStorage.setItem("done_" + CONFIG.modelId, "true");
    }
</script>
</body>
</html>
