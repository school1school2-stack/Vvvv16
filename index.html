<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">جاري التحميل...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --accent: #0284c7; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; direction: rtl; }
        .quiz-container { background: var(--white); width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: right; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover { border-color: var(--accent); background: #f0f9ff; }
        #timer { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-container">
    <div id="login-page">
        <h2 id="display-model-name" style="text-align: center; color: var(--accent);"></h2>
        <p style="text-align: center;">أهلاً بك في منصة التدريب - أ/ عبدالعزيز الفيفي</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي" style="width: 93%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px;">
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="timer">45</div>
        <div id="question-box">
            <h3 id="q-text"></h3>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="final-page" class="hidden" style="text-align: center; padding: 40px;">
        <h2 style="color: var(--accent);">تم الإنتهاء!</h2>
        <p id="final-score" style="font-size: 2rem; font-weight: bold;"></p>
        <p>تم حفظ نتيجتك في لوحة تحكم أ/ عبدالعزيز الفيفي</p>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    const CONFIG = {
        modelId: "16",
        modelName: "نموذج القدرات الشامل (16) الجديد",
        questions: [
            // تناظر لفظي
            { q: "سيف : قِراب", options: ["خاتم : إصبع", "نواة : تمرة", "قدم : نعل", "مصحف : غلاف"], ans: "مصحف : غلاف" },
            { q: "قلم : حبر", options: ["سيارة : وقود", "طائرة : مطار", "شاحن : هاتف", "نور : شمعة"], ans: "سيارة : وقود" },
            { q: "بستان : أشجار", options: ["غابة : وحوش", "جيش : جنود", "فصل : طلاب", "كتاب : صفحات"], ans: "جيش : جنود" },
            { q: "صوم : إفطار", options: ["نوم : استيقاظ", "ذهاب : عودة", "بداية : نهاية", "كل ما سبق"], ans: "كل ما سبق" },
            { q: "سماعة : طبيب", options: ["منجل : فلاح", "سبورة : معلم", "قلم : كاتب", "سكين : جزار"], ans: "منجل : فلاح" },
            { q: "عطش : ماء", options: ["جوع : أكل", "مرض : دواء", "تعب : راحة", "كل ما سبق"], ans: "كل ما سبق" },
            { q: "يقين : شك", options: ["ظن : وهم", "صدق : كذب", "علم : معرفة", "قوة : شجاعة"], ans: "صدق : كذب" },
            { q: "منزل : غرف", options: ["مدرسة : فصول", "كتاب : فصول", "دولة : مدن", "كل ما سبق"], ans: "كل ما سبق" },

            // إكمال جمل
            { q: "إذا أقبلت الدنيا على المرء ........ محاسن غيره، وإذا أدبرت ........ محاسن نفسه.", options: ["أعطته - سلبته", "كست - سلبته", "أظهرت - أخفت", "زادت - نقصت"], ans: "كست - سلبته" },
            { q: "من كثر ضحكه ........ هيبته، ومن كثر مزحه ........ به.", options: ["قلت - استُخف", "زادت - احتُرم", "نقصت - ارتُفع", "ضاع - عُرف"], ans: "قلت - استُخف" },
            { q: "يعد الوعي ........ من الضروريات لحماية ........ من الأوبئة.", options: ["الصحي - الأبدان", "الفكري - العقول", "البيئي - الطبيعة", "الاجتماعي - الناس"], ans: "الصحي - الأبدان" },
            { q: "لا تجعل عوائق ........ تقف حائلاً أمام طموحات ........", options: ["الماضي - المستقبل", "الفشل - النجاح", "اليأس - الأمل", "الفقر - الغنى"], ans: "الماضي - المستقبل" },
            { q: "الإنسان ........ هو الذي يرى في كل مشكلة فرصة.", options: ["المتفائل", "المتشائم", "الذكي", "المثقف"], ans: "المتفائل" },
            { q: "خير الكلام ما ........ ودل، ولم يكن ........ فيمل.", options: ["قل - طويلاً", "قصر - عريضاً", "كثر - قصيراً", "قل - قصيراً"], ans: "قل - طويلاً" },

            // خطأ سياقي
            { q: "من يظن أن المال يشتري السعادة فهو لم يعرف الفقر قط.", options: ["يشتري", "السعادة", "يعرف", "الفقر"], ans: "الفقر" },
            { q: "الابتسامة في وجه أخيك صدقة، وهي تقرب المسافات وتغلق القلوب.", options: ["الابتسامة", "صدقة", "تقرب", "تغلق"], ans: "تغلق" },
            { q: "يجب على المرء أن يكون صبوراً في الشدة، متهوراً في الرخاء.", options: ["صبوراً", "الشدة", "متهوراً", "الرخاء"], ans: "متهوراً" },
            { q: "الحياة قطار سريع يمر بمحطات الفرح والحزن، فأحرص أن يكون ركوبك طويلاً.", options: ["سريع", "الفرح", "أحرص", "طويلاً"], ans: "طويلاً" },
            { q: "الإنجازات العظيمة تحتاج إلى جهد يسير وصبر طويل.", options: ["العظيمة", "جهد", "يسير", "طويل"], ans: "يسير" },
            { q: "كن جواداً مع الناس تنل محبتهم، ولا تكن بخيلاً فيكرهك عدوك.", options: ["جواداً", "محبتهم", "بخيلاً", "عدوك"], ans: "عدوك" },

            // مفردة شاذة
            { q: "اختر المفردة الشاذة: (نحاس - حديد - ذهب - فخار)", options: ["نحاس", "حديد", "ذهب", "فخار"], ans: "فخار" },
            { q: "اختر المفردة الشاذة: (مصر - السودان - تونس - نيجيريا)", options: ["مصر", "السودان", "تونس", "نيجيريا"], ans: "نيجيريا" },
            { q: "اختر المفردة الشاذة: (سيارة - دراجة - شاحنة - طائرة)", options: ["سيارة", "دراجة", "شاحنة", "طائرة"], ans: "طائرة" },
            { q: "اختر المفردة الشاذة: (الجمعة - السبت - ديسمبر - الخميس)", options: ["الجمعة", "السبت", "ديسمبر", "الخميس"], ans: "ديسمبر" },
            { q: "اختر المفردة الشاذة: (فصل - صف - مدرسة - حديقة)", options: ["فصل", "صف", "مدرسة", "حديقة"], ans: "حديقة" },
            { q: "اختر المفردة الشاذة: (تفاح - موز - عنب - طماطم)", options: ["طماطم", "تفاح", "موز", "عنب"], ans: "طماطم" },

            // ارتباط واختلاف
            { q: "ما الكلمة المرتبطة بـ (بحر)؟", options: ["موج", "رمل", "سماء", "جبل"], ans: "موج" },
            { q: "ما الكلمة المرتبطة بـ (غابة)؟", options: ["شجر", "بناء", "سيارة", "شارع"], ans: "شجر" },
            { q: "ما الكلمة المرتبطة بـ (نور)؟", options: ["ظلام", "شمس", "قمر", "كل ما سبق"], ans: "كل ما سبق" },
            { q: "ما الكلمة المرتبطة بـ (مستشفى)؟", options: ["شفاء", "مرض", "طبيب", "كل ما سبق"], ans: "كل ما سبق" },

            // استيعاب مقروء
            { q: "النص: 'التعاون أساس النجاح في العمل الجماعي'. يفهم من النص أن الفرد وحده:", options: ["ينجح دائماً", "يصعب عليه الإنجاز", "لا يحتاج لأحد", "يفشل دائماً"], ans: "يصعب عليه الإنجاز" },
            { q: "النص: 'التدريب المستمر يرفع الكفاءة'. العلاقة بين التدريب والكفاءة:", options: ["طردية", "عكسية", "تضاد", "لا علاقة"], ans: "طردية" },
            { q: "النص: 'القناعة كنز لا يفنى'. القناعة تؤدي إلى:", options: ["الرضا", "الطمع", "الفقر", "الحزن"], ans: "الرضا" },
            { q: "النص: 'العلم يرفع بيوتاً لا عماد لها'. العلم سبب في:", options: ["الرفعة", "البناء", "الهدم", "الجهل"], ans: "الرفعة" },
            { q: "النص: 'الوقاية خير من العلاج'. الأفضل للإنسان هو:", options: ["تجنب المرض", "أخذ الدواء", "زيارة الطبيب", "إهمال الصحة"], ans: "تجنب المرض" },
            { q: "النص: 'الوقت من ذهب'. وجه الشبه هو:", options: ["القيمة", "اللون", "الصلابة", "اللمعان"], ans: "القيمة" },
            { q: "النص: 'الأم مدرسة'. الأم في دورها:", options: ["مربية", "طالبة", "بناء", "كتاب"], ans: "مربية" },
            { q: "النص: 'الرياضة تقوي البدن'. الرياضة وسيلة لـ:", options: ["الصحة", "المرض", "التعب", "الكسل"], ans: "الصحة" },
            { q: "النص: 'الكتب أوفياء'. الكتب تمتاز بـ:", options: ["الفائدة", "الخيانة", "الملل", "الثقل"], ans: "الفائدة" },
            { q: "النص: 'الخلق الحسن زينة'. الخلق الحسن يجمل:", options: ["صاحبه", "ثيابه", "بيته", "ماله"], ans: "صاحبه" }
        ]
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQ = 0, score = 0, timer, userName = "";

    function getDeviceFingerprint() {
        return btoa(navigator.userAgent + navigator.language + screen.width + "A_AZIZ");
    }

    document.getElementById('page-title').innerText = CONFIG.modelName;
    document.getElementById('display-model-name').innerText = CONFIG.modelName;

    async function checkPreviousAttempt() {
        const fingerPrint = getDeviceFingerprint();
        const localCheck = localStorage.getItem("done_" + CONFIG.modelId);
        if (localCheck) return true;

        const snapshot = await db.collection("student_results")
            .where("device_id", "==", fingerPrint)
            .where("model_id", "==", CONFIG.modelId)
            .get();
        return !snapshot.empty;
    }

    async function startQuiz() {
        userName = document.getElementById('student-name').value.trim();
        if (!userName || userName.length < 3) { alert("يرجى إدخال اسمك الحقيقي"); return; }
        
        const alreadyDone = await checkPreviousAttempt();
        if (alreadyDone) {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;color:red'>عذراً، لقد قمت بأداء هذا الاختبار مسبقاً من هذا الجهاز.</h2>";
            return;
        }

        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= CONFIG.questions.length) { finish(); return; }
        const qData = CONFIG.questions[currentQ];
        document.getElementById('q-text').innerText = `سؤال ${currentQ + 1}: ${qData.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        let shuffled = [...qData.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45;
        document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--;
            document.getElementById('timer').innerText = s;
            if (s <= 0) { clearInterval(timer); checkAnswer("N/A"); }
        }, 1000);
    }

    function checkAnswer(selected) {
        clearInterval(timer);
        if (selected === CONFIG.questions[currentQ].ans) score++;
        currentQ++;
        loadQuestion();
    }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${CONFIG.questions.length}`;

        await db.collection("student_results").add({
            name: userName,
            score: score,
            total: CONFIG.questions.length,
            model_id: CONFIG.modelId,
            device_id: getDeviceFingerprint(),
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        localStorage.setItem("done_" + CONFIG.modelId, "true");
    }
</script>
</body>
</html>
