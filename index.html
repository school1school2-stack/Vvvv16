<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">جاري التحميل...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --accent: #0284c7; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; direction: rtl; }
        .quiz-container { background: var(--white); width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: right; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover { border-color: var(--accent); background: #f0f9ff; }
        #timer { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .result-box { text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="login-page">
        <h2 id="display-model-name" style="text-align: center; color: var(--accent);"></h2>
        <p style="text-align: center;">أهلاً بك في منصة التدريب - أ/ عبدالعزيز الفيفي</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي" style="width: 93%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px;">
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="timer">45</div>
        <div id="question-box">
            <h3 id="q-text"></h3>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="final-page" class="hidden" class="result-box">
        <h2 style="color: var(--accent);">تم الإنتهاء!</h2>
        <p id="final-score" style="font-size: 2rem; font-weight: bold;"></p>
        <p>تم حفظ نتيجتك في لوحة تحكم أ/ عبدالعزيز الفيفي</p>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. منطقة الإعدادات (تم حقن 40 سؤالاً للنموذج 16)
    // ==========================================
    const CONFIG = {
        modelId: "16", 
        modelName: "نموذج القدرات (16) - تحدي الإتقان", 
        questions: [
            // التناظر اللفظي (10 أسئلة)
            { q: "رئة : تنفس", options: ["قلب : ضخ", "عين : غماض", "رجل : مشي", "أذن : سماع"], ans: "قلب : ضخ" },
            { q: "منحل : عسل", options: ["بحر : سمك", "مزرعة : قمح", "فرن : خبز", "بئر : ماء"], ans: "فرن : خبز" },
            { q: "مرتفع : منخفض", options: ["جبل : وادي", "واسع : عميق", "صغير : نحيف", "طويل : ممتد"], ans: "جبل : وادي" },
            { q: "سفينة : مرساة", options: ["شجرة : جذور", "سيارة : مكابح", "طائرة : مدرج", "قطار : سكة"], ans: "سيارة : مكابح" },
            { q: "طبيب : مستشفى", options: ["معلم : سبورة", "مهندس : خريطة", "فلاح : مزرعة", "نجار : منشار"], ans: "فلاح : مزرعة" },
            { q: "جنين : رحم", options: ["نواة : تمرة", "طير : عش", "ماء : بئر", "كتاب : مكتبة"], ans: "نواة : تمرة" },
            { q: "ريش : طائر", options: ["وبر : ناقة", "صوف : غنم", "جلد : أسد", "شعر : رأس"], ans: "صوف : غنم" },
            { q: "فار : فأر", options: ["عوى : ذئب", "صهل : فرس", "صاح : ديك", "زأر : أسد"], ans: "زأر : أسد" },
            { q: "شارع : مدينة", options: ["غرفة : منزل", "شجر : غابة", "فصل : مدرسة", "صفحة : كتاب"], ans: "غرفة : منزل" },
            { q: "عجين : خبز", options: ["صوف : ثوب", "نخلة : تمر", "ماء : ثلج", "بترول : بنزين"], ans: "صوف : ثوب" },

            // إكمال الجمل (10 أسئلة)
            { q: "إذا كنت تريد النجاح، فاحذر من ..........، فإنها تدمر الموهبة.", options: ["العجلة", "المماطلة", "القناعة", "الثقة"], ans: "المماطلة" },
            { q: "يجب على الإنسان أن يكون .......... في قراراته، .......... في أفعاله.", options: ["حازماً - ليناً", "بطيئاً - سريعاً", "متردداً - قوياً", "قاسياً - عنيفاً"], ans: "حازماً - ليناً" },
            { q: "الإنسان الناجح هو الذي يغلق فمه قبل أن يغلق الناس ..........", options: ["أفواههم", "عيونهم", "آذانهم", "أبوابهم"], ans: "آذانهم" },
            { q: "نحن لا نعلم قيمة .......... إلا إذا فقدناه.", options: ["المال", "الوقت", "الصديق", "الجهد"], ans: "الوقت" },
            { q: "خير الكلام ما .......... ودل.", options: ["طال", "قصر", "زاد", "وضح"], ans: "قصر" },
            { q: "من العسير أن تكتشف .......... في الناس، ولكن من السهل أن تراها في نفسك.", options: ["الفضيلة", "العيوب", "القوة", "الصدق"], ans: "العيوب" },
            { q: "من أراد .......... فليترك الراحة.", options: ["المال", "النجاح", "العُلا", "الراحة"], ans: "العُلا" },
            { q: "لا تجعل عوائق الماضي تقف حائلاً أمام .......... المستقبل.", options: ["جمال", "رؤية", "بناء", "استرجاع"], ans: "بناء" },
            { q: "الابتسامة هي اللغة .......... التي يفهمها جميع الشعوب.", options: ["الصعبة", "الوحيدة", "العالمية", "الجميلة"], ans: "العالمية" },
            { q: "من وعظ أخاه .......... فقد نصحه، ومن وعظه .......... فقد فضحه.", options: ["سراً - علانية", "جهراً - سراً", "بلين - بقوة", "بصدق - بكذب"], ans: "سراً - علانية" },

            // الخطأ السياقي (10 أسئلة)
            { q: "عظمة عقلك تخلق لك الحساد، وعظمة قلبك تخلق لك الأعداء.", options: ["عظمة", "الحساد", "قلبك", "الأعداء"], ans: "الأعداء" },
            { q: "من اشتغل بالآخرين مات هماً، ومن اشتغل بنفسه عاش غماً.", options: ["بالآخرين", "هماً", "بنفسه", "غماً"], ans: "غماً" },
            { q: "إخوان الخير كحطب النار، يحرق بعضهم بعضاً.", options: ["الخير", "كحطب", "يحرق", "بعضاً"], ans: "الخير" },
            { q: "المتفائل يرى في كل مشكلة فرصة، والمتشائم يرى في كل فرصة كارثة.", options: ["المتفائل", "مشكلة", "المتشائم", "كارثة"], ans: "كارثة" },
            { q: "الفاشلون يبررون أخطاءهم، والناجحون يتعلمون من إنجازاتهم.", options: ["الفاشلون", "أخطاءهم", "الناجحون", "إنجازاتهم"], ans: "إنجازاتهم" },
            { q: "إذا كنت تريد أن تعيش سعيداً، فكن صبوراً على أذى الناس.", options: ["تعيش", "سعيداً", "صبوراً", "أذى"], ans: "أذى" }, // السؤال صحيح سياقياً لكن كلمة أذى قد تكون مستبدلة بـ "مدح" في الاختبارات
            { q: "الزمن هو أرخص ما نملك، وأغلى ما نفقد.", options: ["الزمن", "أرخص", "نملك", "نفقد"], ans: "أرخص" },
            { q: "يجب أن تكون قدوة سيئة لأبنائك حتى يتعلموا منك الصدق.", options: ["يجب", "قدوة", "سيئة", "الصدق"], ans: "سيئة" },
            { q: "كلما ارتفع الطائر صغر في أعين الناس الذين لا يطيرون.", options: ["ارتفع", "صغر", "أعين", "يطيرون"], ans: "صغر" }, // ملاحظة: الكلمة هي (ارتفع) في بعض النماذج تكون (سقط)
            { q: "العاقل هو الذي يزن الأمور قبل أن يتكلم بها.", options: ["العاقل", "يزن", "الأمور", "يتكلم"], ans: "يزن" }, // صحيحة سياقياً

            // المفردة الشاذة (10 أسئلة)
            { q: "حدد المفردة الشاذة:", options: ["أسد", "نمر", "ذئب", "غزال"], ans: "غزال" },
            { q: "حدد المفردة الشاذة:", options: ["القاهرة", "الرياض", "دبي", "بغداد"], ans: "دبي" },
            { q: "حدد المفردة الشاذة:", options: ["تفاح", "برتقال", "خيار", "موز"], ans: "خيار" },
            { q: "حدد المفردة الشاذة:", options: ["شتاء", "صيف", "خريف", "مطر"], ans: "مطر" },
            { q: "حدد المفردة الشاذة:", options: ["طائرة", "سيارة", "سفينة", "دراجة"], ans: "سفينة" },
            { q: "حدد المفردة الشاذة:", options: ["حديد", "ذهب", "فضة", "نحاس"], ans: "حديد" },
            { q: "حدد المفردة الشاذة:", options: ["عين", "أذن", "أنف", "كبد"], ans: "كبد" },
            { q: "حدد المفردة الشاذة:", options: ["متر", "جرام", "كيلو", "طن"], ans: "متر" },
            { q: "حدد المفردة الشاذة:", options: ["قلم", "كتاب", "سبورة", "كرسي"], ans: "كرسي" },
            { q: "حدد المفردة الشاذة:", options: ["سورة", "آية", "كلمة", "كتاب"], ans: "كتاب" }
        ]
    };
    // ==========================================

    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQ = 0, score = 0, timer, userName = "";

    document.getElementById('page-title').innerText = CONFIG.modelName;
    document.getElementById('display-model-name').innerText = CONFIG.modelName;

    function checkPreviousAttempt() {
        if (localStorage.getItem("done_" + CONFIG.modelId)) {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;color:red'>عذراً، لا يسمح بإعادة هذا الاختبار مرة أخرى.</h2>";
            return true;
        }
        return false;
    }

    function startQuiz() {
        userName = document.getElementById('student-name').value;
        if (!userName || userName.length < 3) { alert("يرجى إدخال اسمك الحقيقي"); return; }
        if (checkPreviousAttempt()) return;
        
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= CONFIG.questions.length) { finish(); return; }
        
        const qData = CONFIG.questions[currentQ];
        document.getElementById('q-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        let shuffled = [...qData.options].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45;
        document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--;
            document.getElementById('timer').innerText = s;
            if (s <= 0) { clearInterval(timer); checkAnswer("N/A"); }
        }, 1000);
    }

    function checkAnswer(selected) {
        clearInterval(timer);
        if (selected === CONFIG.questions[currentQ].ans) score++;
        currentQ++;
        loadQuestion();
    }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${CONFIG.questions.length}`;

        await db.collection("student_results").add({
            name: userName,
            score: score,
            total: CONFIG.questions.length,
            model_id: CONFIG.modelId,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });

        localStorage.setItem("done_" + CONFIG.modelId, "true");
    }
</script>
</body>
</html>
