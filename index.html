<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">جاري التحميل...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --accent: #0284c7; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; direction: rtl; }
        .quiz-container { background: var(--white); width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: right; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover { border-color: var(--accent); background: #f0f9ff; }
        #timer { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="quiz-container">
    <div id="login-page">
        <h2 id="display-model-name" style="text-align: center; color: var(--accent);"></h2>
        <p style="text-align: center;">أهلاً بك في منصة التدريب - أ/ عبدالعزيز الفيفي</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي" style="width: 93%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px;">
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="timer">45</div>
        <div id="question-box">
            <h3 id="q-text"></h3>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="final-page" class="hidden" style="text-align: center; padding: 40px;">
        <h2 style="color: var(--accent);">تم الإنتهاء!</h2>
        <p id="final-score" style="font-size: 2rem; font-weight: bold;"></p>
        <p>تم حفظ نتيجتك في لوحة تحكم أ/ عبدالعزيز الفيفي</p>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    const CONFIG = {
        modelId: "16",
        modelName: "نموذج القدرات الشامل (16)",
        questions: [
            [span_5](start_span)// التناظر اللفظي[span_5](end_span)
            { q: "رئة : تنفس", options: ["قلب : ضخ", "عين : رؤية", "أذن : سماع", "رجل : مشي"], ans: "قلب : ضخ" },
            { q: "كتاب : ورقة", options: ["يوم : ساعة", "مدرسة : فناء", "شجرة : غصن", "عمارة : طابق"], ans: "شجرة : غصن" },
            { q: "منحل : عسل", options: ["حقل : قمح", "فرن : خبز", "بحر : سمك", "منجم : ذهب"], ans: "منجم : ذهب" },
            { q: "حمامة : سلام", options: ["صقر : قوة", "ثعلب : مكر", "نملة : صبر", "أسد : شجاعة"], ans: "ثعلب : مكر" },
            { q: "غليان : تبخر", options: ["تفكير : حل", "مذاكرة : نجاح", "زراعة : حصاد", "سرعة : حادث"], ans: "سرعة : حادث" },
            { q: "بصمة : إصبع", options: ["توقيع : قلم", "صوت : حنجرة", "مشية : رجل", "رائحة : ورد"], ans: "صوت : حنجرة" },
            [span_6](start_span)// إكمال الجمل[span_6](end_span)
            { q: "يعد الوعي ........ من أهم المطالب التي يجب غرسها في الأطفال لحماية ........ من التلوث.", options: ["البيئي - الطبيعة", "الصحي - الأجسام", "الفكري - العقول", "الوطني - البلاد"], ans: "البيئي - الطبيعة" },
            { q: "من زاد حبه لنفسه زاد ........ الناس له.", options: ["كره", "تقدير", "احترام", "قرب"], ans: "كره" },
            { q: "إن المعلومات التي نستقيها من ........ تكون أكثر ........ من تلك التي نأخذها من الشائعات.", options: ["المصادر - دقة", "الكتب - سهولة", "الإنترنت - انتشاراً", "الناس - غرابة"], ans: "المصادر - دقة" },
            { q: "لا تجادل ........ فقد يخطئ الناس في التفريق بينكما.", options: ["الأحمق", "العالم", "الكبير", "الصغير"], ans: "الأحمق" },
            { q: "الابتسامة هي الطريق ........ لكسب ........ الآخرين.", options: ["الأقصر - قلوب", "الأفضل - احترام", "الأسهل - عقول", "الوحيد - مودة"], ans: "الأقصر - قلوب" },
            { q: "من أراد ........ فعليه بالصبر، فمن فقد الصبر فقد ........ الطريق.", options: ["النجاح - أضاع", "الراحة - وجد", "العلم - عرف", "المال - رسم"], ans: "النجاح - أضاع" },
            [span_7](start_span)// الخطأ السياقي[span_7](end_span)
            { q: "المتفائل يرى فرصة في كل صعوبة، والمتطلع يرى صعوبة في كل فرصة.", options: ["المتطلع", "فرصة", "صعوبة", "يرى"], ans: "المتطلع" },
            { q: "من زاد حياؤه ذهب سروره وقلّ قدره عند الناس.", options: ["حياؤه", "ذهب", "سروره", "قدره"], ans: "حياؤه" },
            { q: "إنجازاتك الحالية هي نتاج أفكارك الفاشلة التي كنت تحملها في الماضي.", options: ["الفاشلة", "الحالية", "نتاج", "تحملها"], ans: "الفاشلة" },
            { q: "الكلام كالدواء، إن أقللت منه نفع، وإن أكثرت منه قتل.", options: ["قتل", "أقللت", "نفع", "الدواء"], ans: "قتل" },
            { q: "لا تمازح اللئيم فيحنق عليك، ولا تمازح الكريم فيستخف بك.", options: ["يحنق", "اللئيم", "الكريم", "يستخف"], ans: "يحنق" },
            { q: "الناجح الحقيقي هو من يغلق فمه قبل أن يغلق الناس آذانهم.", options: ["يغلق", "الناجح", "فمه", "آذانهم"], ans: "يغلق" },
            [span_8](start_span)// المفردة الشاذة[span_8](end_span)
            { q: "اختر المفردة الشاذة: (أسد - نمر - فهد - غزال)", options: ["غزال", "أسد", "نمر", "فهد"], ans: "غزال" },
            { q: "اختر المفردة الشاذة: (متر - جرام - كيلومتر - ميل)", options: ["جرام", "متر", "كيلومتر", "ميل"], ans: "جرام" },
            { q: "اختر المفردة الشاذة: (الرياض - جدة - الدمام - مكة)", options: ["الرياض", "جدة", "الدمام", "مكة"], ans: "الرياض" },
            { q: "اختر المفردة الشاذة: (السبت - الأربعاء - يناير - الجمعة)", options: ["يناير", "السبت", "الأربعاء", "الجمعة"], ans: "يناير" },
            { q: "اختر المفردة الشاذة: (قلم - كتاب - ممحاة - سبورة)", options: ["سبورة", "قلم", "كتاب", "ممحاة"], ans: "سبورة" },
            { q: "اختر المفردة الشاذة: (تفاح - جزر - برتقال - موز)", options: ["جزر", "تفاح", "برتقال", "موز"], ans: "جزر" },
            [span_9](start_span)// الارتباط والاختلاف[span_9](end_span)
            { q: "ما الكلمة الأكثر ارتباطاً بـ (شتاء)؟", options: ["مطر", "ثلج", "برد", "صيف"], ans: "برد" },
            { q: "ما الكلمة الأكثر ارتباطاً بـ (طائرة)؟", options: ["مطار", "سفر", "طيار", "جناح"], ans: "جناح" },
            { q: "ما الكلمة الأكثر ارتباطاً بـ (نحلة)؟", options: ["عسل", "خلية", "لدغة", "رحيق"], ans: "عسل" },
            { q: "ما الكلمة الأكثر ارتباطاً بـ (مستشفى)؟", options: ["طبيب", "مريض", "دواء", "إسعاف"], ans: "طبيب" },
            { q: "ما الكلمة الأكثر ارتباطاً بـ (جيش)؟", options: ["سلاح", "جندي", "حرب", "نصر"], ans: "جندي" },
            { q: "ما الكلمة الأكثر ارتباطاً بـ (صيدلية)؟", options: ["دواء", "طبيب", "وصفة", "مرض"], ans: "دواء" },
            [span_10](start_span)// استيعاب المقروء[span_10](end_span)
            { q: "النص: 'يعد التلوث البصري من المشاكل المعاصرة التي تؤدي لإجهاد العين'. يستنتج أن التلوث البصري يؤدي لـ:", options: ["تعب عضوي", "ضعف نظر", "جمال مدن", "زيادة وعي"], ans: "تعب عضوي" },
            { q: "النص: 'الماء هو المكون الأساسي للحياة'. أنسب عنوان للنص:", options: ["أهمية الماء", "دورة الماء", "تلوث الماء", "خصائص الماء"], ans: "أهمية الماء" },
            { q: "النص: 'التعلم في الصغر كالنقش على الحجر'. يفهم من النص أن التعلم مبكراً يمتاز بـ:", options: ["الثبات", "السهولة", "السرعة", "الصعوبة"], ans: "الثبات" },
            { q: "النص: 'القراءة تغذي العقل'. العلاقة بين القراءة والعقل:", options: ["غذاء", "تعب", "إهمال", "نمو"], ans: "غذاء" },
            { q: "النص: 'الصدق منجاة'. يفهم من النص أن الصدق يؤدي لـ:", options: ["السلامة", "الخطر", "الربح", "التعب"], ans: "السلامة" },
            { q: "النص: 'الوقت كالسيف'. وجه الشبه هنا هو:", options: ["القوة والقطع", "اللمعان", "الجمال", "الطول"], ans: "القوة والقطع" },
            { q: "النص: 'النوم المبكر يجدد الطاقة'. فائدة النوم المبكر:", options: ["استعادة النشاط", "الكسل", "الأحلام", "تضييع الوقت"], ans: "استعادة النشاط" },
            { q: "النص: 'الرياضة تقوي الأجسام'. الرياضة وسيلة لـ:", options: ["الصحة", "المرض", "التعب", "الملل"], ans: "الصحة" },
            { q: "النص: 'الشمس مصدر الضوء'. الشمس تعتبر:", options: ["مصدراً طبيعياً", "مصدراً صناعياً", "كوكباً", "قمراً"], ans: "مصدراً طبيعياً" },
            { q: "النص: 'الصبر مفتاح الفرج'. الضيق يزول بـ:", options: ["الصبر", "الغضب", "البكاء", "النوم"], ans: "الصبر" }
        ]
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQ = 0, score = 0, timer, userName = "";

    // توليد "بصمة جهاز" فريدة لكل جهاز
    function getDeviceFingerprint() {
        return btoa(navigator.userAgent + navigator.language + screen.width + "A_AZIZ");
    }

    document.getElementById('page-title').innerText = CONFIG.modelName;
    document.getElementById('display-model-name').innerText = CONFIG.modelName;

    async function checkPreviousAttempt() {
        const fingerPrint = getDeviceFingerprint();
        const localCheck = localStorage.getItem("done_" + CONFIG.modelId);
        
        if (localCheck) return true;

        // فحص قاعدة البيانات للتأكد من أن هذا الجهاز لم يختبر من قبل (حتى لو مسح بيانات المتصفح)
        const snapshot = await db.collection("student_results")
            .where("device_id", "==", fingerPrint)
            .where("model_id", "==", CONFIG.modelId)
            .get();
        
        return !snapshot.empty;
    }

    async function startQuiz() {
        userName = document.getElementById('student-name').value.trim();
        if (!userName || userName.length < 3) { alert("يرجى إدخال اسمك الحقيقي"); return; }
        
        const alreadyDone = await checkPreviousAttempt();
        if (alreadyDone) {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;color:red'>عذراً، لقد قمت بأداء هذا الاختبار مسبقاً من هذا الجهاز.</h2>";
            return;
        }

        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= CONFIG.questions.length) { finish(); return; }
        const qData = CONFIG.questions[currentQ];
        document.getElementById('q-text').innerText = `سؤال ${currentQ + 1}: ${qData.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        let shuffled = [...qData.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45;
        document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--;
            document.getElementById('timer').innerText = s;
            if (s <= 0) { clearInterval(timer); checkAnswer("N/A"); }
        }, 1000);
    }

    function checkAnswer(selected) {
        clearInterval(timer);
        if (selected === CONFIG.questions[currentQ].ans) score++;
        currentQ++;
        loadQuestion();
    }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${CONFIG.questions.length}`;

        await db.collection("student_results").add({
            name: userName,
            score: score,
            total: CONFIG.questions.length,
            model_id: CONFIG.modelId,
            device_id: getDeviceFingerprint(), // حفظ بصمة الجهاز
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        localStorage.setItem("done_" + CONFIG.modelId, "true");
    }
</script>
</body>
</html>
